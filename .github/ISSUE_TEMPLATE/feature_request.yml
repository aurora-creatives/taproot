name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a request, please check the [roadmap](docs/architecture.md) to see if it's already planned.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of taproot does this relate to?
      options:
        - Agent / analysis loop
        - PageIndex (similarity search)
        - CLI commands
        - ITSM provider adapter (ServiceNow, Jira, etc.)
        - Mock / fixture data
        - Output / reporting
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap in current behaviour.
      placeholder: "Currently, taproot can only... which means I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this
